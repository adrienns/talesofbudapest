# Next.js production template — terminate TLS here and keep the Node origin
# private. The dedicated X-Tales-Client-IP header is overwritten for every
# request; application rate limiters intentionally ignore X-Forwarded-For.

upstream talesofbudapest_frontend {
  server 127.0.0.1:3000;
}

server {
  listen 80;
  server_name app.yourdomain.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name app.yourdomain.com;

  ssl_certificate     /etc/letsencrypt/live/app.yourdomain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.yourdomain.com/privkey.pem;

  location / {
    proxy_pass http://talesofbudapest_frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Tales-Client-IP $remote_addr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
